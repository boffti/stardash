name: Bug Report
description: Something isn't working as expected
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! Please fill out as much as you can — it helps us fix things faster.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Dashboard
        - Repo Intel
        - Contribute / Contribution Brief
        - Discover / Search
        - Trending
        - Settings / Tags / Collections
        - Auth / Login
        - Self-hosting / Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reliably trigger this?
      value: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or error output
      description: Paste any error messages, stack traces, or screenshots here.
      render: shell

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Hosted app (stardash.dev)
        - Self-hosted (Docker)
        - Local dev
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 124 on macOS 14"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — related issues, workarounds you've tried, etc.
